# =============================================================================
# Fichier de configuration du pipeline - construction d'un graphe de pangenome
# =============================================================================

# Répertoire contenant les fichiers FASTA assemblés
# Format des noms de fichiers : <espece>_<chrom>_<commentaire>.fasta
# Ex : pdestructans_chrom1_run1.fasta → dossier de sortie result_pdestructans_chrom1_run1/            
input_dir: "input_data/"

# Répertoire de sortie racine
# conseillé : "/scratch/<EspacePerso>/all_results"

output_dir: "all_results"

# --- Sélection des isolats --------------------------------------------------
# Pour tester sur un sous-ensemble : N premiers isolats de chaque FASTA.
# Mettre `null` (ou supprimer la ligne) pour prendre tous les isolats.
n_first: 5

# Isolat de référence (premier de la liste si null)
reference: null

# Si les noms de records ont un suffixe commun à virer (ex: "_chr1"), le mettre
# ici. Permet d'avoir des noms de fichiers plus propres dans la sortie.
# null = garder les noms tels quels.
strip_suffix: null

# --- Paramètres Minigraph ----------------------------------------------------
minigraph:
  min_sv_len: 50      # -L : taille minimale d'une SV (défaut 50)
  threads: 4

# --- Sélection des constructeurs --------------------------------------------
# Mettre true pour activer, false pour désactiver.
tools:
  minigraph: true
  pggb: false
  minigraph_cactus: false
  GTsequences : false
  visualisation: false   # true = génère les images Bandage (+ déplace les PNGs PGGB dans visu_images/)

# --- Paramètres Minigraph-Cactus --------------------------------------------
minigraph_cactus:
  threads: 4
  # gfa_mode : variante(s) de graphe demandée(s) à cactus-pangenome (--gfa ...)
  #   ""        -> défaut cactus = graphe "clip" (séquences non-alignées >10kb retirées)
  #   "full"    -> graphe complet, aucune séquence retirée : la concaténation des
  #                noeuds du walk redonne exactement la séquence d'origine
  #   "clip", "filter" ou une combinaison ("full clip filter") sont aussi possibles.
  gfa_mode: "full"

# --- Paramètres SyRI ---------------------------------------------------------
syri:
  threads: 4

# --- Paramètres PGGB --------------------------------------------------------
pggb:
  n_haplotypes: null   # null = auto (nombre d'isolats sélectionnés)
  segment_length: 5000 # -s : longueur de segment
  percent_identity: 90 # -p : % identité minimum
  threads: 4
