# =============================================================================
# Configuration du pipeline PanQueSt - version simple (Minigraph seul)
# =============================================================================

# Chemin vers le fichier multi-FASTA d'entrée
# Chaque enregistrement (>nom) = un isolat (un assemblage complet)
input: "data/isolates.fa"

# Nom du run : utilisé pour nommer le dossier de sortie
run_name: "test_5isolats"

# Répertoire de sortie
output_dir: "results"

# --- Sélection des isolats --------------------------------------------------
# Pour tester sur un sous-ensemble : N premiers isolats du fichier d'entrée.
# Mettre `null` (ou supprimer la ligne) pour prendre tous les isolats.
n_first: 5

# Isolat de référence pour Minigraph (= 1er fichier passé à minigraph).
# `null` -> premier isolat du fichier (après application de n_first).
reference: null

# Si les noms de records ont un suffixe commun à virer (ex: "_chr1"), le mettre
# ici. Permet d'avoir des noms de fichiers plus propres dans la sortie.
# null = ne rien virer.
strip_suffix: "_chr1"

# --- Paramètres Minigraph ----------------------------------------------------
minigraph:
  min_sv_len: 50      # -L : taille minimale d'une SV (défaut 50)
  threads: 4
