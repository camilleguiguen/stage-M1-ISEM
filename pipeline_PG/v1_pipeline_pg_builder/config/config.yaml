# =============================================================================
# Fichier de configuration du pipeline - construction d'un graphe de pangenome
# =============================================================================

# Chemin vers le fichier multi-FASTA d'entrée
# Fichier où chaque (>nom) = un isolat (assemblage complet)
input: "data/mes_data_assemblees.fasta"

# --- Identifiant du run (compose le nom du dossier de sortie) ---------------
# Dossier créé : all_results/result_<species>_chrom<chrom>_<other>/
species: "ecoli"
chrom: "1"
other: "test"

# Répertoire de sortie racine
output_dir: "all_results"

# --- Sélection des isolats --------------------------------------------------
# Pour tester sur un sous-ensemble : N premiers isolats du fichier d'entrée.
# Mettre `null` (ou supprimer la ligne) pour prendre tous les isolats.
n_first: 5

# Si les noms de records ont un suffixe commun à virer (ex: "_chr1"), le mettre
# ici. Permet d'avoir des noms de fichiers plus propres dans la sortie.
# null = garder les noms tels quels.
strip_suffix: null

# --- Paramètres Minigraph ----------------------------------------------------
minigraph:
  min_sv_len: 50      # -L : taille minimale d'une SV (défaut 50)
  threads: 4
